<div style="padding:24px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 style="margin:0;">Klienten</h2>
    <button mat-raised-button color="primary" routerLink="/neu">+ Neuer Klient</button>
  </div>

  <div *ngIf="fehler"
       style="background:#fde;border:1px solid #f99;padding:12px;border-radius:6px;margin-bottom:16px;color:#900;">
    {{ fehler }}
  </div>

  <p *ngIf="!fehler && faelle.length === 0" style="color:#666;">Noch keine Klienten.</p>

  <table mat-table [dataSource]="faelle" style="width:100%;" *ngIf="faelle.length > 0">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let f"><strong>{{ f.vorname }} {{ f.nachname }}</strong></td>
    </ng-container>

    <ng-container matColumnDef="alterJahre">
      <th mat-header-cell *matHeaderCellDef>Alter</th>
      <td mat-cell *matCellDef="let f">{{ f.alterJahre }} J.</td>
    </ng-container>

    <ng-container matColumnDef="geschlecht">
      <th mat-header-cell *matHeaderCellDef>Geschlecht</th>
      <td mat-cell *matCellDef="let f">{{ f.geschlecht }}</td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let f">
        <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:12px;">
          {{ f.anonymerCode }}
        </code>
      </td>
    </ng-container>

    <ng-container matColumnDef="erstelltAm">
      <th mat-header-cell *matHeaderCellDef>Angelegt</th>
      <td mat-cell *matCellDef="let f">{{ f.erstelltAm | date:'dd.MM.yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="aktion">
      <th mat-header-cell *matHeaderCellDef>Aktionen</th>
      <td mat-cell *matCellDef="let f" style="white-space:nowrap;">
        <button mat-stroked-button color="primary"
                [routerLink]="['/assessment', f.id]" style="margin-right:8px;">
          Assessment
        </button>
        <button mat-stroked-button color="accent"
                [routerLink]="['/monitoring', f.id]">
          Monitoring
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="spalten"></tr>
    <tr mat-row *matRowDef="let row; columns: spalten;"></tr>
  </table>
</div>
