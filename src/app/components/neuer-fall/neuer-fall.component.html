<div style="padding:24px;max-width:500px;">
  <h2>Neuen Klienten anlegen</h2>

  <form [formGroup]="form" (ngSubmit)="speichern()">
    <div style="display:flex;gap:16px;margin-bottom:8px;">
      <mat-form-field appearance="outline" style="flex:1;">
        <mat-label>Vorname</mat-label>
        <input matInput formControlName="vorname">
        <mat-error>Pflichtfeld</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" style="flex:1;">
        <mat-label>Nachname</mat-label>
        <input matInput formControlName="nachname">
        <mat-error>Pflichtfeld</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" style="width:100%;margin-bottom:8px;">
      <mat-label>Alter (Jahre)</mat-label>
      <input matInput type="number" formControlName="alterJahre">
      <mat-error>Pflichtfeld</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%;margin-bottom:16px;">
      <mat-label>Geschlecht</mat-label>
      <mat-select formControlName="geschlecht">
        <mat-option *ngFor="let g of geschlechter" [value]="g">{{ g }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div style="background:#e8f4fd;padding:10px 14px;border-radius:6px;
                margin-bottom:20px;font-size:13px;color:#1a5276;">
      Name wird in der Datenbank gespeichert.
      An ChatGPT gehen ausschliesslich klinische Daten — kein Name.
    </div>

    <div style="display:flex;gap:12px;">
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || laedt">
        {{ laedt ? 'Wird angelegt...' : 'Anlegen und weiter' }}
      </button>
      <button mat-button type="button" routerLink="/">Abbrechen</button>
    </div>
  </form>
</div>
