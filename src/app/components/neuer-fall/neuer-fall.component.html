<div style="padding:24px;max-width:500px;">
  <h2>Neuen Fall anlegen</h2>
  <p style="color:#666;font-size:14px;">Kein Name wird gespeichert. Das System generiert automatisch einen anonymen Code.</p>

  <form [formGroup]="form" (ngSubmit)="speichern()">

    <mat-form-field appearance="outline" style="width:100%;margin-bottom:12px;">
      <mat-label>Diaetologin / Diaetologe</mat-label>
      <input matInput formControlName="erstelltVon" placeholder="Name der Fachkraft">
      <mat-error>Pflichtfeld</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%;margin-bottom:12px;">
      <mat-label>Alter des Klienten (Jahre)</mat-label>
      <input matInput type="number" formControlName="alterJahre" placeholder="z.B. 17">
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%;margin-bottom:20px;">
      <mat-label>Geschlecht</mat-label>
      <mat-select formControlName="geschlecht">
        <mat-option *ngFor="let g of geschlechter" [value]="g">{{ g }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div style="display:flex;gap:12px;">
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || laedt">
        {{ laedt ? 'Wird gespeichert...' : 'Anlegen & weiter zum Assessment' }}
      </button>
      <button mat-button type="button" routerLink="/">Abbrechen</button>
    </div>

  </form>
</div>
